version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      time: "04:00"
    commit-message:
      prefix: "Deps"
    allow:
    - dependency-type: direct
    - dependency-type: indirect
    groups:
      go-dev-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "Deps"
    groups:
      github-actions:
        patterns:
          - "*"
